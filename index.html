<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tetris HTML LIGHT</title>
  <link rel="icon" href="tetris_miel_1280x640.png">

  <!-- FAVICON -->
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_16.png">
  <link rel="apple-touch-icon" href="favicon_180.png">

  <style>
    body {
      background: linear-gradient(to bottom, #f5f7fa, #e4ecf5);
      color: #222;
      text-align: center;
      font-family: Arial;
    }
    canvas {
      background: #ffffff;
      display: block;
      margin: 20px auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <p>Puntos: <span id="score">0</span></p>
  <canvas id="game" width="240" height="400"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scale = 20;
    const rows = 20;
    const cols = 12;

    ctx.scale(scale, scale);

    const arena = Array.from({ length: rows }, () => Array(cols).fill(0));

    const colors = [
      null,
      '#f4c430', '#f4c430', '#f4c430', '#f4c430', '#f4c430', '#f4c430', '#f4c430'
    ];

    function createPiece(type) {
      switch(type) {
        case 'T': return [[0,1,0],[1,1,1],[0,0,0]];
        case 'O': return [[2,2],[2,2]];
        case 'L': return [[0,3,0],[0,3,0],[0,3,3]];
        case 'J': return [[0,4,0],[0,4,0],[4,4,0]];
        case 'I': return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
        case 'S': return [[0,6,6],[6,6,0],[0,0,0]];
        case 'Z': return [[7,7,0],[0,7,7],[0,0,0]];
      }
    }

    function drawBlock(x, y, color) {
      const gradient = ctx.createRadialGradient(x + 0.5, y + 0.5, 0.1, x + 0.5, y + 0.5, 0.7);
      gradient.addColorStop(0, 'rgba(255, 245, 180, 0.95)');
      gradient.addColorStop(0.4, color);
      gradient.addColorStop(1, 'rgba(180, 120, 20, 0.9)');

      ctx.fillStyle = gradient;
      ctx.fillRect(x, y, 1, 1);

      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(x + 0.3, y + 0.3, 0.15, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            drawBlock(x + offset.x, y + offset.y, colors[value]);
          }
        });
      });
    }

    function draw() {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawMatrix(arena, {x:0, y:0});
      drawMatrix(player.matrix, player.pos);
    }

    function merge(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function collide(arena, player) {
      const [m, o] = [player.matrix, player.pos];
      for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
          if (m[y][x] !== 0 &&
              (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }

    function rotate(matrix) {
      for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }
      matrix.forEach(row => row.reverse());
    }

    function playerReset() {
      const pieces = 'TJLOSZI';
      player.matrix = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
      player.pos.y = 0;
      player.pos.x = Math.floor(cols/2) - Math.floor(player.matrix[0].length/2);

      if (collide(arena, player)) {
        arena.forEach(row => row.fill(0));
        score = 0;
        updateScore();
      }
    }

    function arenaSweep() {
      let rowCount = 1;
      outer: for (let y = arena.length - 1; y >= 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
          if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        flashLines();

        score += rowCount * 10;
        rowCount *= 2;
      }
    }

    function flashLines() {
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function playerDrop() {
      player.pos.y++;
      if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
      }
      dropCounter = 0;
    }

    function playerHardDrop() {
      while (!collide(arena, player)) {
        player.pos.y++;
      }
      player.pos.y--;
      merge(arena, player);
      playerReset();
      arenaSweep();
      updateScore();
      dropCounter = 0;
    }

    function playerMove(dir) {
      player.pos.x += dir;
      if (collide(arena, player)) {
        player.pos.x -= dir;
      }
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;

      if (dropCounter > dropInterval) {
        playerDrop();
      }

      draw();
      requestAnimationFrame(update);
    }

    function updateScore() {
      document.getElementById('score').innerText = score;
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowLeft') playerMove(-1);
      else if (event.key === 'ArrowRight') playerMove(1);
      else if (event.key === 'ArrowDown') playerDrop();
      else if (event.key === 'ArrowUp') rotate(player.matrix);
      else if (event.code === 'Space') playerHardDrop();
    });

    const player = {
      pos: {x: 0, y: 0},
      matrix: null
    };

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let score = 0;

    playerReset();
    updateScore();
    update();
  </script>
</body>
</html>
